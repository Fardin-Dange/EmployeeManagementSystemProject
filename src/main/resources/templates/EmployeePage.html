<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Employee List</title>
<style>
* { box-sizing: border-box; }
body {
    font-family: 'Segoe UI', Arial, sans-serif;
    background: linear-gradient(135deg,#667eea,#764ba2);
    margin: 0;
}
.header {
    background: rgba(255,255,255,0.15);
    backdrop-filter: blur(8px);
    padding: 15px 30px;
    color: white;
    font-size: 22px;
    font-weight: bold;
    display: flex;
    justify-content: space-between;
    align-items: center;
}
.back-btn {
    background: white;
    color: #667eea;
    border: none;
    padding: 8px 16px;
    border-radius: 6px;
    font-weight: bold;
    cursor: pointer;
    transition: 0.25s;
}
.back-btn:hover { background: #f1f3ff; }
.container {
    width: 92%;
    max-width: 950px;
    margin: 35px auto;
    background: #ffffff;
    padding: 25px;
    border-radius: 14px;
    box-shadow: 0 15px 35px rgba(0,0,0,0.25);
}
table { width: 100%; border-collapse: collapse; border-radius: 10px; overflow: hidden; }
th { background: #667eea; color: white; padding: 14px; font-size: 15px; }
td { padding: 12px; text-align: center; border-bottom: 1px solid #eee; }
tr:hover { background: #f6f8ff; transition: 0.2s; }
.btn { padding: 7px 14px; border-radius: 6px; text-decoration: none; color: white; font-size: 13px; font-weight: 600; }
.edit-btn { background: #28a745; }
.edit-btn:hover { background: #218838; }
.delete-btn { background: #dc3545; border: none; cursor: pointer; color: white; }
.delete-btn:hover { background: #c82333; }
.empty { text-align: center; padding: 30px; color: #777; font-weight: 500; }
</style>
</head>
<body>

<div th:if="${msg != null}">
    <script th:inline="javascript">
        alert([[${msg}]]);
    </script>
</div>

<div th:if="${error != null}">
    <script th:inline="javascript">
        alert([[${error}]]);
    </script>
</div>

<div class="header">
    <div>Employee List</div>
    <form action="dashboard" method="get" style="margin:0;">
        <button class="back-btn">← Dashboard</button>
    </form>
</div>

<div class="container">
    <table>
        <tr>
            <th>Id</th>
            <th>Name</th>
            <th>Role</th>
            <th>Salary</th>
            <th>Edit</th>
            <th>Delete</th>
        </tr>

        <tr th:if="${#lists.isEmpty(EmpList)}">
            <td colspan="6" class="empty">No employees found</td>
        </tr>

        <tr th:each="emp : ${EmpList}">
            <td th:text="${emp.id}"></td>
            <td th:text="${emp.name}"></td>
            <td th:text="${emp.role}"></td>
            <td th:text="${emp.salary}"></td>
            <td>
                <a class="btn edit-btn" th:href="@{/editEmployeePage(id=${emp.id})}">Edit</a>
            </td>
            <td>
                <form action="deleteEmployee" method="get" style="margin:0;">
                    <input type="hidden" name="id" th:value="${emp.id}">
                    <button class="btn delete-btn"
                            onclick="return confirm('Delete this employee?')">
                        Delete
                    </button>
                </form>
            </td>
        </tr>
    </table>
</div>

</body>
</html>
